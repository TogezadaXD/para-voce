<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low Budget Studio — Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Special+Elite&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0905;
      color: #f0ddb0;
      font-family: 'Special Elite', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      background: #0d0d0d;
      border-bottom: 2px solid #c8963e;
      flex-shrink: 0;
    }
    .logo-small {
      width: 36px; height: 36px;
      object-fit: contain;
      opacity: 0.9;
    }
    .back-btn {
      background: none;
      border: 1px solid #c8963e55;
      color: #c8963e;
      font-family: 'Special Elite', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 3px;
      letter-spacing: 0.1em;
      transition: background 0.15s;
    }
    .back-btn:hover { background: #c8963e22; }
    .video-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: #c8963e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* Filmstrip accent */
    .filmstrip-bar {
      height: 20px;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .fhole {
      width: 14px; height: 10px;
      background: #0d0905;
      border-radius: 2px;
      flex-shrink: 0;
      margin: 0 5px;
    }

    /* Player area */
    .player-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 40px;
    }

    .player-outer {
      width: 100%;
      max-width: 1000px;
      border: 2px solid #c8963e55;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 60px #00000088, inset 0 0 0 1px #c8963e22;
    }

    /* Video container — position relative so controls overlay it */
    .video-container {
      position: relative;
      width: 100%;
      background: #000;
      line-height: 0; /* removes inline gap */
    }

    video {
      width: 100%;
      display: block;
      /* no aspect-ratio — let the video determine its own height */
      min-height: 200px;
      position: relative;
      z-index: 1; /* video above bg, below overlays */
    }

    /* Flash overlay (play/pause indicator) — sits above video */
    .flash {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s;
    }
    .flash.show { opacity: 1; transition: none; }
    .flash-icon {
      width: 72px; height: 72px;
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    /* Volume indicator */
    .vol-toast {
      position: absolute;
      top: 14px; right: 16px;
      z-index: 3;
      background: rgba(13,10,5,0.85);
      border: 1px solid #c8963e55;
      border-radius: 3px;
      padding: 5px 12px;
      font-size: 0.82rem;
      color: #c8963e;
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .vol-toast.show { opacity: 1; }

    /* Controls bar — overlays bottom of video */
    .controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 4;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
      padding: 32px 16px 12px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .video-container:hover .controls,
    .video-container.paused .controls { opacity: 1; }

    /* Seek bar */
    .seek-wrap {
      position: relative;
      height: 5px;
      background: #ffffff22;
      border-radius: 99px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: height 0.15s;
    }
    .seek-wrap:hover { height: 8px; }
    .seek-buffered {
      position: absolute; top: 0; left: 0;
      height: 100%;
      background: #ffffff33;
      border-radius: 99px;
      pointer-events: none;
    }
    .seek-fill {
      position: absolute; top: 0; left: 0;
      height: 100%;
      background: #c8963e;
      border-radius: 99px;
      pointer-events: none;
    }

    /* Bottom row */
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #f0ddb0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s, transform 0.1s;
    }
    .ctrl-btn:hover { color: #c8963e; transform: scale(1.15); }
    .ctrl-btn:active { transform: scale(0.9); }

    .time-display {
      font-size: 0.75rem;
      color: #c8a060;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .spacer { flex: 1; }

    input[type=range].vol-range {
      -webkit-appearance: none;
      appearance: none;
      width: 72px;
      height: 3px;
      background: #555;
      border-radius: 99px;
      cursor: pointer;
      outline: none;
    }
    input[type=range].vol-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #c8963e;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <img class="logo-small" src="/logo.png" alt="LBS" />
    <button class="back-btn" onclick="history.back()">◂ VOLTAR</button>
    <span class="video-title" id="video-title">Carregando...</span>
  </div>

  <div class="filmstrip-bar" id="fs-top">
    <script>document.write(Array(80).fill('<div class="fhole"></div>').join(''))</script>
  </div>

  <div class="player-wrap">
    <div class="player-outer">
      <div class="video-container paused" id="vc">

        <video id="video" preload="metadata" playsinline></video>

        <!-- flash indicator -->
        <div class="flash" id="flash">
          <div class="flash-icon" id="flash-icon">▶</div>
        </div>

        <!-- volume toast -->
        <div class="vol-toast" id="vol-toast">🔊 100%</div>

        <!-- controls overlay -->
        <div class="controls" id="controls">
          <div class="seek-wrap" id="seek-wrap">
            <div class="seek-buffered" id="seek-buffered"></div>
            <div class="seek-fill" id="seek-fill"></div>
          </div>
          <div class="ctrl-row">
            <button class="ctrl-btn" id="play-btn" title="Play/Pause [Espaço]">▶</button>
            <button class="ctrl-btn" id="vol-down" title="Volume − [↓]">🔉</button>
            <input type="range" class="vol-range" id="vol-range" min="0" max="100" value="100" title="Volume" />
            <button class="ctrl-btn" id="vol-up" title="Volume + [↑]">🔊</button>
            <span class="time-display" id="time-display">0:00 / 0:00</span>
            <div class="spacer"></div>
            <button class="ctrl-btn" id="mute-btn" title="Mudo [M]">🔊</button>
            <button class="ctrl-btn" id="fs-btn" title="Tela cheia [F]">⛶</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const filename = params.get('v');

    if (!filename) {
      document.getElementById('video-title').textContent = 'Vídeo não especificado';
    } else {
      const displayName = decodeURIComponent(filename).replace(/^\d+-/, '');
      document.title = `${displayName} — Low Budget Studio`;
      document.getElementById('video-title').textContent = displayName;

      const video   = document.getElementById('video');
      const vc      = document.getElementById('vc');
      const playBtn = document.getElementById('play-btn');
      const volDown = document.getElementById('vol-down');
      const volUp   = document.getElementById('vol-up');
      const volRange= document.getElementById('vol-range');
      const muteBtn = document.getElementById('mute-btn');
      const timeEl  = document.getElementById('time-display');
      const seekFill= document.getElementById('seek-fill');
      const seekBuf = document.getElementById('seek-buffered');
      const seekWrap= document.getElementById('seek-wrap');
      const fsBtn   = document.getElementById('fs-btn');
      const flash   = document.getElementById('flash');
      const flashIcon= document.getElementById('flash-icon');
      const volToast= document.getElementById('vol-toast');

      video.src = `/stream/${encodeURIComponent(filename)}`;

      let flashTimer, volTimer, dragging = false;

      // --- Play / Pause ---
      function togglePlay() {
        if (video.paused) video.play(); else video.pause();
      }

      video.addEventListener('play', () => {
        playBtn.textContent = '⏸';
        vc.classList.remove('paused');
        showFlash('⏸');
      });
      video.addEventListener('pause', () => {
        playBtn.textContent = '▶';
        vc.classList.add('paused');
        showFlash('▶');
      });

      playBtn.addEventListener('click', togglePlay);
      video.addEventListener('click', togglePlay);

      function showFlash(icon) {
        flashIcon.textContent = icon;
        flash.classList.remove('show');
        void flash.offsetWidth; // reflow to restart transition
        flash.classList.add('show');
        clearTimeout(flashTimer);
        flashTimer = setTimeout(() => flash.classList.remove('show'), 650);
      }

      // --- Volume ---
      function setVolume(val) {
        val = Math.max(0, Math.min(100, Math.round(val)));
        video.volume = val / 100;
        video.muted = val === 0;
        volRange.value = val;
        updateMuteBtn();
        showVolToast(val);
      }

      function updateMuteBtn() {
        muteBtn.textContent = video.muted || video.volume === 0 ? '🔇' : '🔊';
      }

      function showVolToast(val) {
        const icon = val === 0 ? '🔇' : val < 50 ? '🔉' : '🔊';
        volToast.textContent = `${icon} ${val}%`;
        volToast.classList.add('show');
        clearTimeout(volTimer);
        volTimer = setTimeout(() => volToast.classList.remove('show'), 1200);
      }

      volRange.addEventListener('input', () => setVolume(Number(volRange.value)));
      volUp.addEventListener('click', () => setVolume(video.volume * 100 + 10));
      volDown.addEventListener('click', () => setVolume(video.volume * 100 - 10));
      muteBtn.addEventListener('click', () => {
        video.muted = !video.muted;
        updateMuteBtn();
        showVolToast(video.muted ? 0 : Math.round(video.volume * 100));
      });

      // --- Progress ---
      function fmt(s) {
        s = Math.floor(s || 0);
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
        return h > 0
          ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
          : `${m}:${String(sec).padStart(2,'0')}`;
      }

      video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        const pct = (video.currentTime / video.duration) * 100;
        seekFill.style.width = pct + '%';
        timeEl.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
      });

      video.addEventListener('progress', () => {
        if (!video.duration || !video.buffered.length) return;
        seekBuf.style.width = (video.buffered.end(video.buffered.length - 1) / video.duration * 100) + '%';
      });

      function seekTo(e) {
        const rect = seekWrap.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        video.currentTime = pct * video.duration;
      }

      seekWrap.addEventListener('mousedown', e => { dragging = true; seekTo(e); });
      document.addEventListener('mousemove', e => { if (dragging) seekTo(e); });
      document.addEventListener('mouseup', () => { dragging = false; });

      // --- Fullscreen ---
      fsBtn.addEventListener('click', () => {
        const target = document.fullscreenElement ? null : vc;
        target ? vc.requestFullscreen() : document.exitFullscreen();
      });
      document.addEventListener('fullscreenchange', () => {
        fsBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
      });

      // --- Keyboard ---
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        switch (e.key) {
          case ' ': case 'k': e.preventDefault(); togglePlay(); break;
          case 'ArrowUp':    e.preventDefault(); setVolume(video.volume * 100 + 5); break;
          case 'ArrowDown':  e.preventDefault(); setVolume(video.volume * 100 - 5); break;
          case 'ArrowRight': video.currentTime = Math.min(video.duration, video.currentTime + 10); break;
          case 'ArrowLeft':  video.currentTime = Math.max(0, video.currentTime - 10); break;
          case 'f': case 'F':
            document.fullscreenElement ? document.exitFullscreen() : vc.requestFullscreen(); break;
          case 'm': case 'M':
            video.muted = !video.muted;
            updateMuteBtn();
            showVolToast(video.muted ? 0 : Math.round(video.volume * 100));
            break;
        }
      });
    }
  </script>
</body>
</html>
