<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low Budget Studio — Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Special+Elite&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0905;
      color: #f0ddb0;
      font-family: 'Special Elite', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      background: #0d0d0d;
      border-bottom: 2px solid #c8963e;
      flex-shrink: 0;
    }
    .logo-small { width: 36px; height: 36px; object-fit: contain; }
    .back-btn {
      background: none;
      border: 1px solid #c8963e55;
      color: #c8963e;
      font-family: 'Special Elite', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 3px;
      letter-spacing: 0.1em;
    }
    .back-btn:hover { background: #c8963e22; }
    .video-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: #c8963e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .filmstrip-bar {
      height: 20px;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .fhole {
      width: 14px; height: 10px;
      background: #0d0905;
      border-radius: 2px;
      flex-shrink: 0;
      margin: 0 5px;
    }

    .player-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .player-outer {
      width: 100%;
      max-width: 1000px;
      border: 2px solid #c8963e55;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 60px #00000088;
      background: #000;
    }

    /* Vídeo ocupa toda a largura, altura natural — SEM overlay em cima */
    video {
      width: 100%;
      display: block;
      background: #000;
      max-height: 70vh;
    }

    /* Aviso de codec */
    .codec-warn {
      display: none;
      background: #3a1a0a;
      border-top: 1px solid #c8963e55;
      padding: 10px 18px;
      font-size: 0.82rem;
      color: #f0a060;
      letter-spacing: 0.03em;
    }
    .codec-warn.show { display: block; }

    /* Controles ficam ABAIXO do vídeo — sem interferir na renderização */
    .controls {
      background: #0d0d0d;
      border-top: 2px solid #c8963e;
      padding: 10px 16px 12px;
    }

    /* Seek bar */
    .seek-wrap {
      position: relative;
      height: 5px;
      background: #2a1e10;
      border-radius: 99px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .seek-wrap:hover { height: 7px; }
    .seek-buffered {
      position: absolute; top: 0; left: 0;
      height: 100%;
      background: #ffffff22;
      border-radius: 99px;
      pointer-events: none;
    }
    .seek-fill {
      position: absolute; top: 0; left: 0;
      height: 100%;
      background: #c8963e;
      border-radius: 99px;
      pointer-events: none;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #f0ddb0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s, transform 0.1s;
    }
    .ctrl-btn:hover { color: #c8963e; transform: scale(1.15); }
    .ctrl-btn:active { transform: scale(0.9); }

    .time-display {
      font-size: 0.78rem;
      color: #c8a060;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .spacer { flex: 1; }

    input[type=range].vol-range {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 4px;
      background: #3a2a10;
      border-radius: 99px;
      cursor: pointer;
      outline: none;
    }
    input[type=range].vol-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #c8963e;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <img class="logo-small" src="/logo.png" alt="LBS" />
    <button class="back-btn" onclick="history.back()">◂ VOLTAR</button>
    <span class="video-title" id="video-title">Carregando...</span>
  </div>

  <div class="filmstrip-bar">
    <script>document.write(Array(80).fill('<div class="fhole"></div>').join(''))</script>
  </div>

  <div class="player-wrap">
    <div class="player-outer">

      <video id="video" preload="auto" playsinline></video>

      <div class="codec-warn" id="codec-warn">
        ⚠ Este vídeo não pode ser exibido — o codec pode não ser suportado pelo navegador.
        Converta para <strong>MP4 (H.264)</strong> e envie novamente.
      </div>

      <div class="controls">
        <div class="seek-wrap" id="seek-wrap">
          <div class="seek-buffered" id="seek-buffered"></div>
          <div class="seek-fill" id="seek-fill"></div>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn" id="play-btn" title="Play/Pause [Espaço]">▶</button>
          <button class="ctrl-btn" id="vol-down" title="Volume − [↓]">🔉</button>
          <input type="range" class="vol-range" id="vol-range" min="0" max="100" value="100" />
          <button class="ctrl-btn" id="vol-up" title="Volume + [↑]">🔊</button>
          <button class="ctrl-btn" id="mute-btn" title="Mudo [M]">🔊</button>
          <span class="time-display" id="time-display">0:00 / 0:00</span>
          <div class="spacer"></div>
          <button class="ctrl-btn" id="fs-btn" title="Tela cheia [F]">⛶</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const filename = params.get('v');

    if (!filename) {
      document.getElementById('video-title').textContent = 'Vídeo não especificado';
    } else {
      const displayName = decodeURIComponent(filename).replace(/^\d+-/, '');
      document.title = `${displayName} — Low Budget Studio`;
      document.getElementById('video-title').textContent = displayName;

      const video    = document.getElementById('video');
      const playBtn  = document.getElementById('play-btn');
      const volDown  = document.getElementById('vol-down');
      const volUp    = document.getElementById('vol-up');
      const volRange = document.getElementById('vol-range');
      const muteBtn  = document.getElementById('mute-btn');
      const timeEl   = document.getElementById('time-display');
      const seekFill = document.getElementById('seek-fill');
      const seekBuf  = document.getElementById('seek-buffered');
      const seekWrap = document.getElementById('seek-wrap');
      const fsBtn    = document.getElementById('fs-btn');
      const codecWarn= document.getElementById('codec-warn');

      video.src = `/stream/${filename}`;
      video.load();

      // Detecção de codec sem suporte
      video.addEventListener('error', () => codecWarn.classList.add('show'));

      // Detecta se vídeo está a tocar mas sem frames (codec de vídeo sem suporte)
      video.addEventListener('playing', () => {
        setTimeout(() => {
          if (video.videoWidth === 0) codecWarn.classList.add('show');
        }, 800);
      });

      // Play / Pause
      function togglePlay() {
        if (video.paused) video.play(); else video.pause();
      }
      video.addEventListener('play',  () => playBtn.textContent = '⏸');
      video.addEventListener('pause', () => playBtn.textContent = '▶');
      playBtn.addEventListener('click', togglePlay);
      video.addEventListener('click', togglePlay);

      // Volume
      function setVolume(val) {
        val = Math.max(0, Math.min(100, Math.round(val)));
        video.volume = val / 100;
        video.muted = val === 0;
        volRange.value = val;
        muteBtn.textContent = (video.muted || val === 0) ? '🔇' : '🔊';
      }
      volRange.addEventListener('input', () => setVolume(Number(volRange.value)));
      volUp.addEventListener('click',   () => setVolume(video.volume * 100 + 10));
      volDown.addEventListener('click', () => setVolume(video.volume * 100 - 10));
      muteBtn.addEventListener('click', () => {
        video.muted = !video.muted;
        muteBtn.textContent = video.muted ? '🔇' : '🔊';
      });

      // Progress
      function fmt(s) {
        s = Math.floor(s || 0);
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
        return h > 0
          ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
          : `${m}:${String(sec).padStart(2,'0')}`;
      }
      video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        seekFill.style.width = (video.currentTime / video.duration * 100) + '%';
        timeEl.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
      });
      video.addEventListener('progress', () => {
        if (!video.duration || !video.buffered.length) return;
        seekBuf.style.width = (video.buffered.end(video.buffered.length - 1) / video.duration * 100) + '%';
      });

      // Seek
      let dragging = false;
      function seekTo(e) {
        const rect = seekWrap.getBoundingClientRect();
        video.currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * video.duration;
      }
      seekWrap.addEventListener('mousedown', e => { dragging = true; seekTo(e); });
      document.addEventListener('mousemove', e => { if (dragging) seekTo(e); });
      document.addEventListener('mouseup', () => dragging = false);

      // Fullscreen — tela cheia no player inteiro
      const playerOuter = document.querySelector('.player-outer');
      fsBtn.addEventListener('click', () => {
        document.fullscreenElement ? document.exitFullscreen() : playerOuter.requestFullscreen();
      });
      document.addEventListener('fullscreenchange', () => {
        fsBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
      });

      // Keyboard
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        switch (e.key) {
          case ' ': case 'k': e.preventDefault(); togglePlay(); break;
          case 'ArrowUp':    e.preventDefault(); setVolume(video.volume * 100 + 5); break;
          case 'ArrowDown':  e.preventDefault(); setVolume(video.volume * 100 - 5); break;
          case 'ArrowRight': video.currentTime = Math.min(video.duration, video.currentTime + 10); break;
          case 'ArrowLeft':  video.currentTime = Math.max(0, video.currentTime - 10); break;
          case 'f': case 'F':
            document.fullscreenElement ? document.exitFullscreen() : playerOuter.requestFullscreen(); break;
          case 'm': case 'M':
            video.muted = !video.muted;
            muteBtn.textContent = video.muted ? '🔇' : '🔊'; break;
        }
      });
    }
  </script>
</body>
</html>
