<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low Budget Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1208;
      --surface: rgba(10,7,3,0.75);
      --border: rgba(200,150,62,0.25);
      --border-hover: rgba(200,150,62,0.6);
      --accent: #c8963e;
      --accent-dim: rgba(200,150,62,0.07);
      --text: #f0ddb0;
      --text-muted: #8a7050;
      --text-subtle: #4a3828;
      --green: #7dba6e;
      --red: #c0504a;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(200,150,62,0.06) 0%, transparent 60%),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 48px),
        repeating-linear-gradient(0deg,  rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 48px);
      color: var(--text);
      font-family: 'Special Elite', 'Courier New', monospace;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* Film strip */
    .filmstrip {
      height: 30px;
      background: #0a0700;
      display: flex;
      align-items: center;
      overflow: hidden;
      border-bottom: 2px solid var(--accent);
    }
    .fhole {
      width: 18px; height: 13px;
      background: var(--bg);
      border-radius: 3px;
      flex-shrink: 0;
      margin: 0 5px;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 36px;
    }

    .logo-frame {
      position: relative;
      margin-bottom: 20px;
    }

    /* Golden corner decorations */
    .logo-frame::before,
    .logo-frame::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.7;
    }
    .logo-frame::before {
      top: -6px; left: -6px;
      border-width: 2px 0 0 2px;
    }
    .logo-frame::after {
      bottom: -6px; right: -6px;
      border-width: 0 2px 2px 0;
    }

    .logo-frame-inner {
      position: relative;
    }
    .logo-frame-inner::before,
    .logo-frame-inner::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.7;
    }
    .logo-frame-inner::before {
      top: -6px; right: -6px;
      border-width: 2px 2px 0 0;
    }
    .logo-frame-inner::after {
      bottom: -6px; left: -6px;
      border-width: 0 0 2px 2px;
    }

    .logo-frame img {
      display: block;
      width: 340px;
      height: auto;
      border: 1px solid rgba(200,150,62,0.2);
      filter:
        drop-shadow(0 0 30px rgba(200,150,62,0.12))
        drop-shadow(0 8px 32px rgba(0,0,0,0.6));
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-shadow: 0 2px 12px rgba(200,150,62,0.25), 1px 1px 0 #0008;
      margin-bottom: 6px;
    }

    header p.tagline {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .header-divider {
      width: 280px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 28px auto 0;
      opacity: 0.4;
    }

    /* Main content */
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 0;
    }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed rgba(200,150,62,0.28);
      border-radius: 3px;
      padding: 36px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 36px;
      background: var(--accent-dim);
      position: relative;
    }
    .upload-zone::before, .upload-zone::after {
      content: '✦';
      position: absolute;
      top: 10px;
      color: rgba(200,150,62,0.35);
      font-size: 0.8rem;
    }
    .upload-zone::before { left: 14px; }
    .upload-zone::after  { right: 14px; }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(200,150,62,0.1);
    }
    .upload-zone strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 7px;
    }
    .upload-zone p { color: var(--text-muted); font-size: 0.76rem; letter-spacing: 0.04em; }
    .upload-zone span.badge {
      display: inline-block;
      margin-top: 11px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(200,150,62,0.22);
      color: var(--text-muted);
      font-size: 0.68rem;
      padding: 3px 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #file-input { display: none; }

    /* Progress */
    .progress-wrap {
      display: none;
      margin-bottom: 20px;
      background: rgba(10,7,3,0.6);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 18px;
    }
    .progress-wrap.active { display: block; }
    .progress-label { font-size: 0.76rem; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .progress-bar-bg { height: 3px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 99px; transition: width 0.15s; }
    .progress-pct { font-size: 0.7rem; color: var(--accent); margin-top: 5px; text-align: right; }

    /* Status */
    .status { font-size: 0.8rem; margin-bottom: 18px; min-height: 1.2em; letter-spacing: 0.04em; text-align: center; }
    .status.ok  { color: var(--green); }
    .status.err { color: var(--red); }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .section-header::before, .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border));
    }
    .section-header::after {
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
    .count-badge {
      font-size: 0.65rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 1px 8px;
      letter-spacing: 0.06em;
    }

    /* Video list */
    .video-list { display: flex; flex-direction: column; gap: 8px; }

    .video-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 13px 16px;
      transition: border-color 0.15s, background 0.15s;
      backdrop-filter: blur(4px);
    }
    .video-item:hover {
      border-color: var(--border-hover);
      background: rgba(200,150,62,0.05);
    }

    .video-icon { font-size: 1.4rem; flex-shrink: 0; }

    .video-info { flex: 1; min-width: 0; }
    .video-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .video-meta { font-size: 0.68rem; color: var(--text-subtle); margin-top: 3px; letter-spacing: 0.04em; }

    .btn-play {
      background: var(--accent);
      color: #0d0a04;
      border: none;
      padding: 7px 18px;
      font-size: 0.72rem;
      font-family: 'Special Elite', monospace;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.1em;
      transition: opacity 0.15s;
    }
    .btn-play:hover { opacity: 0.82; }

    .btn-delete {
      background: transparent;
      color: var(--text-subtle);
      border: 1px solid rgba(74,56,40,0.5);
      padding: 7px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-delete:hover { color: var(--red); border-color: rgba(192,80,74,0.4); }

    .empty {
      color: var(--text-subtle);
      text-align: center;
      padding: 52px 0;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
    }

    /* Bottom filmstrip */
    .filmstrip-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 26px;
      background: #0a0700;
      display: flex;
      align-items: center;
      border-top: 2px solid var(--accent);
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="filmstrip" id="filmstrip-top"></div>

  <header>
    <div class="logo-frame">
      <div class="logo-frame-inner">
        <img src="/logo.png" alt="Low Budget Studio" />
      </div>
    </div>
    <h1>Low Budget Studio</h1>
    <p class="tagline">Sua biblioteca de vídeos</p>
    <div class="header-divider"></div>
  </header>

  <main>
    <div class="upload-zone" id="drop-zone">
      <strong>Clique ou arraste para enviar</strong>
      <p>Envie vídeos já convertidos para H.264</p>
      <span class="badge">MP4 · até 20 GB</span>
      <input type="file" id="file-input" accept=".mp4,.m4v" />
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label" id="progress-label">Enviando...</div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>

    <div class="status" id="status"></div>

    <div class="section-header">
      <h2>Na Biblioteca</h2>
      <span class="count-badge" id="count-badge">0</span>
    </div>
    <div class="video-list" id="video-list"></div>
  </main>

  <div class="filmstrip-bottom" id="filmstrip-bottom"></div>

  <script>
    document.getElementById('filmstrip-top').innerHTML    = Array(90).fill('<div class="fhole"></div>').join('');
    document.getElementById('filmstrip-bottom').innerHTML = Array(90).fill('<div class="fhole"></div>').join('');

    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const progressWrap= document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressPct = document.getElementById('progress-pct');
    const progressLabel=document.getElementById('progress-label');
    const statusEl    = document.getElementById('status');
    const listEl      = document.getElementById('video-list');
    const countBadge  = document.getElementById('count-badge');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => fileInput.files[0] && uploadFile(fileInput.files[0]));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
    });

    function uploadFile(file) {
      const form = new FormData();
      form.append('video', file);
      const xhr = new XMLHttpRequest();
      progressWrap.classList.add('active');
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = `Enviando: ${file.name}`;
      setStatus('');
      xhr.upload.addEventListener('progress', e => {
        if (!e.lengthComputable) return;
        const pct = Math.round((e.loaded / e.total) * 100);
        progressBar.style.width = pct + '%';
        progressPct.textContent = pct + '%';
      });
      xhr.addEventListener('load', () => {
        progressWrap.classList.remove('active');
        if (xhr.status === 200) { setStatus('Vídeo enviado com sucesso!', 'ok'); loadVideos(); }
        else { setStatus('Erro ao enviar o vídeo.', 'err'); }
        fileInput.value = '';
      });
      xhr.addEventListener('error', () => {
        progressWrap.classList.remove('active');
        setStatus('Erro de conexão.', 'err');
        fileInput.value = '';
      });
      xhr.open('POST', '/upload');
      xhr.send(form);
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    function formatSize(b) {
      if (b < 1024 ** 2) return (b / 1024).toFixed(1) + ' KB';
      if (b < 1024 ** 3) return (b / 1024 ** 2).toFixed(1) + ' MB';
      return (b / 1024 ** 3).toFixed(2) + ' GB';
    }

    function formatDate(d) {
      return new Date(d).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
    }

    async function loadVideos() {
      const res = await fetch('/videos');
      const videos = await res.json();
      listEl.innerHTML = '';
      countBadge.textContent = videos.length;
      if (!videos.length) {
        listEl.innerHTML = '<div class="empty">— Nenhum vídeo na biblioteca ainda —</div>';
        return;
      }
      videos.forEach(v => {
        const enc  = encodeURIComponent(v.filename);
        const name = v.filename.replace(/^\d+-/, '').replace(/\.[^.]+$/, '');
        const ext  = v.filename.split('.').pop().toUpperCase();
        const item = document.createElement('div');
        item.className = 'video-item';
        item.innerHTML = `
          <div class="video-icon">📽</div>
          <div class="video-info">
            <div class="video-name">${name}</div>
            <div class="video-meta">${ext} &nbsp;·&nbsp; ${formatSize(v.size)} &nbsp;·&nbsp; ${formatDate(v.date)}</div>
          </div>
          <button class="btn-play" onclick="watch('${enc}')">▶ ASSISTIR</button>
          <button class="btn-delete" title="Apagar" onclick="deleteVideo('${enc}')">🗑</button>
        `;
        listEl.appendChild(item);
      });
    }

    function watch(filename) { window.location.href = `/player.html?v=${filename}`; }

    async function deleteVideo(filename) {
      if (!confirm('Apagar este vídeo da biblioteca?')) return;
      const res = await fetch(`/videos/${filename}`, { method: 'DELETE' });
      if (res.ok) loadVideos();
      else setStatus('Erro ao apagar.', 'err');
    }

    loadVideos();
  </script>
</body>
</html>
