<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low Budget Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Special+Elite&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1c1008;
      background-image:
        repeating-linear-gradient(90deg, rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 1px, transparent 1px, transparent 40px),
        linear-gradient(160deg, #2e1a0a 0%, #1c1008 40%, #110b04 100%);
      color: #f0ddb0;
      font-family: 'Special Elite', 'Courier New', monospace;
      min-height: 100vh;
    }

    /* Film strip top */
    .filmstrip {
      height: 36px;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      gap: 0;
      overflow: hidden;
      border-bottom: 3px solid #c8963e;
    }
    .filmstrip-hole {
      width: 22px; height: 18px;
      background: #1c1008;
      border-radius: 3px;
      flex-shrink: 0;
      margin: 0 6px;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 20px;
      border-bottom: 2px solid #c8963e44;
      position: relative;
    }
    header img.logo {
      width: 160px;
      height: 160px;
      object-fit: contain;
      filter: drop-shadow(0 4px 24px #0008);
      margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #c8963e;
      letter-spacing: 0.08em;
      text-shadow: 2px 2px 0 #0008;
    }
    header p.tagline {
      font-size: 0.8rem;
      color: #9a7a50;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    main { max-width: 860px; margin: 0 auto; padding: 36px 20px 60px; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed #c8963e88;
      border-radius: 4px;
      padding: 44px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 40px;
      background: rgba(200,150,62,0.04);
      position: relative;
    }
    .upload-zone::before, .upload-zone::after {
      content: '✦';
      position: absolute;
      top: 10px;
      color: #c8963e66;
      font-size: 0.9rem;
    }
    .upload-zone::before { left: 14px; }
    .upload-zone::after { right: 14px; }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #c8963e;
      background: rgba(200,150,62,0.08);
    }
    .upload-zone strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: #f0ddb0;
      margin-bottom: 8px;
    }
    .upload-zone p { color: #9a7a50; font-size: 0.82rem; letter-spacing: 0.05em; }
    #file-input { display: none; }

    /* Progress */
    .progress-wrap {
      display: none;
      margin-bottom: 24px;
      background: #0d0d0d;
      border: 1px solid #c8963e44;
      border-radius: 4px;
      padding: 16px 20px;
    }
    .progress-wrap.active { display: block; }
    .progress-label { font-size: 0.82rem; color: #9a7a50; margin-bottom: 8px; letter-spacing: 0.05em; }
    .progress-bar-bg { height: 5px; background: #2a1e10; border-radius: 99px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: #c8963e; border-radius: 99px; transition: width 0.15s; }
    .progress-pct { font-size: 0.82rem; color: #c8963e; margin-top: 6px; text-align: right; }

    /* Status */
    .status { font-size: 0.88rem; margin-bottom: 24px; min-height: 1.2em; letter-spacing: 0.04em; }
    .status.ok { color: #7dba6e; }
    .status.err { color: #c0504a; }

    /* Section title */
    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .section-title span {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #c8963e;
      letter-spacing: 0.06em;
    }
    .section-title::before, .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #c8963e44;
    }

    /* Video list */
    .video-list { display: flex; flex-direction: column; gap: 10px; }

    .video-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(13,10,5,0.7);
      border: 1px solid #c8963e33;
      border-left: 3px solid #c8963e;
      border-radius: 4px;
      padding: 14px 18px;
      transition: border-color 0.15s, background 0.15s;
    }
    .video-item:hover { border-color: #c8963eaa; background: rgba(200,150,62,0.06); }

    .video-thumb { font-size: 1.8rem; flex-shrink: 0; }

    .video-info { flex: 1; min-width: 0; }
    .video-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: #f0ddb0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .video-meta { font-size: 0.75rem; color: #7a6040; margin-top: 4px; letter-spacing: 0.04em; }

    .btn-play {
      background: #c8963e;
      color: #0d0d0d;
      border: none;
      border-radius: 3px;
      padding: 8px 18px;
      font-size: 0.82rem;
      font-family: 'Special Elite', monospace;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 700;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }
    .btn-play:hover { background: #e0ad55; }

    .btn-delete {
      background: transparent;
      color: #5a4030;
      border: 1px solid #3a2a1a;
      border-radius: 3px;
      padding: 8px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-delete:hover { color: #c0504a; border-color: #c0504a; }

    .btn-convert {
      background: transparent;
      color: #c8963e;
      border: 1px solid #c8963e66;
      border-radius: 3px;
      padding: 8px 12px;
      font-size: 0.78rem;
      font-family: 'Special Elite', monospace;
      cursor: pointer;
      flex-shrink: 0;
      letter-spacing: 0.06em;
      transition: background 0.15s;
    }
    .btn-convert:hover { background: #c8963e22; }
    .btn-convert:disabled { opacity: 0.4; cursor: default; }

    .converting-badge {
      font-size: 0.72rem;
      color: #c8963e;
      letter-spacing: 0.08em;
      animation: pulse 1.2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .empty {
      color: #5a4030;
      text-align: center;
      padding: 40px 0;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    /* Filmstrip bottom */
    .filmstrip-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      border-top: 3px solid #c8963e;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="filmstrip">
    <script>document.write(Array(60).fill('<div class="filmstrip-hole"></div>').join(''))</script>
  </div>

  <header>
    <img class="logo" src="/logo.png" alt="Low Budget Studio" />
    <h1>Low Budget Studio</h1>
    <p class="tagline">Sua biblioteca de vídeos</p>
  </header>

  <main>
    <div class="upload-zone" id="drop-zone">
      <strong>Clique ou arraste o vídeo aqui</strong>
      <p>MP4 · MKV · WebM · MOV · AVI &nbsp;—&nbsp; até 20 GB</p>
      <input type="file" id="file-input" accept=".mp4,.mkv,.webm,.mov,.avi" />
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label" id="progress-label">Enviando...</div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>

    <div class="status" id="status"></div>

    <div class="section-title"><span>Na Biblioteca</span></div>
    <div class="video-list" id="video-list"></div>
  </main>

  <div class="filmstrip-bottom">
    <script>document.write(Array(60).fill('<div class="filmstrip-hole"></div>').join(''))</script>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressPct = document.getElementById('progress-pct');
    const progressLabel = document.getElementById('progress-label');
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('video-list');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => fileInput.files[0] && uploadFile(fileInput.files[0]));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
    });

    function uploadFile(file) {
      const form = new FormData();
      form.append('video', file);
      const xhr = new XMLHttpRequest();
      progressWrap.classList.add('active');
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = `Enviando: ${file.name}`;
      setStatus('');

      xhr.upload.addEventListener('progress', e => {
        if (!e.lengthComputable) return;
        const pct = Math.round((e.loaded / e.total) * 100);
        progressBar.style.width = pct + '%';
        progressPct.textContent = pct + '%';
      });
      xhr.addEventListener('load', () => {
        progressWrap.classList.remove('active');
        if (xhr.status === 200) { setStatus('Vídeo enviado com sucesso!', 'ok'); loadVideos(); }
        else { setStatus('Erro ao enviar o vídeo.', 'err'); }
        fileInput.value = '';
      });
      xhr.addEventListener('error', () => {
        progressWrap.classList.remove('active');
        setStatus('Erro de conexão.', 'err');
        fileInput.value = '';
      });
      xhr.open('POST', '/upload');
      xhr.send(form);
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    function formatSize(b) {
      if (b < 1024 ** 2) return (b / 1024).toFixed(1) + ' KB';
      if (b < 1024 ** 3) return (b / 1024 ** 2).toFixed(1) + ' MB';
      return (b / 1024 ** 3).toFixed(2) + ' GB';
    }

    function formatDate(d) {
      return new Date(d).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
    }

    async function loadVideos() {
      const res = await fetch('/videos');
      const videos = await res.json();
      listEl.innerHTML = '';
      if (!videos.length) {
        listEl.innerHTML = '<div class="empty">— Nenhum vídeo na biblioteca ainda —</div>';
        return;
      }
      videos.forEach(v => {
        const isMkv = /\.mkv$/i.test(v.filename);
        const enc = encodeURIComponent(v.filename);
        const item = document.createElement('div');
        item.className = 'video-item';
        item.dataset.filename = v.filename;
        item.innerHTML = `
          <div class="video-thumb">📽</div>
          <div class="video-info">
            <div class="video-name">${v.filename.replace(/^\d+-/, '')}</div>
            <div class="video-meta">${formatSize(v.size)} &nbsp;·&nbsp; ${formatDate(v.date)}${isMkv ? ' &nbsp;·&nbsp; <span style="color:#c8963e">MKV</span>' : ''}</div>
          </div>
          ${v.converting
            ? `<span class="converting-badge">⚙ CONVERTENDO...</span>`
            : isMkv
              ? `<button class="btn-convert" onclick="convertVideo('${enc}', this)">⚙ CONVERTER</button>`
              : `<button class="btn-play" onclick="watch('${enc}')">▶ ASSISTIR</button>`
          }
          <button class="btn-delete" title="Apagar" onclick="deleteVideo('${enc}')">🗑</button>
        `;
        listEl.appendChild(item);
      });
    }

    function watch(filename) { window.location.href = `/player.html?v=${filename}`; }

    async function convertVideo(filename, btn) {
      btn.disabled = true;
      btn.textContent = '⚙ CONVERTENDO...';
      await fetch(`/convert/${filename}`, { method: 'POST' });
      pollConversion(decodeURIComponent(filename));
    }

    function pollConversion(filename) {
      const enc = encodeURIComponent(filename);
      const interval = setInterval(async () => {
        const res = await fetch(`/convert-status/${enc}`);
        const data = await res.json();
        if (data.status === 'done' || data.status === 'error') {
          clearInterval(interval);
          if (data.status === 'error') setStatus('Erro na conversão.', 'err');
          loadVideos();
        }
      }, 4000);
    }

    async function deleteVideo(filename) {
      if (!confirm('Apagar este vídeo da biblioteca?')) return;
      const res = await fetch(`/videos/${filename}`, { method: 'DELETE' });
      if (res.ok) loadVideos();
      else setStatus('Erro ao apagar.', 'err');
    }

    loadVideos();
  </script>
</body>
</html>
